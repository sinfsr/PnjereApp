name: Build APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HAS_RELEASE_SIGNING: ${{ secrets.KEYSTORE_BASE64 != '' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Unzip project
        run: unzip -o app.zip -d project

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # کیستور دیباگ رو بین اجراهای مختلف کش می‌کنیم تا امضای همه‌ی APKها ثابت بمونه
      # (وگرنه هر بار یه کیستور تصادفی جدید ساخته می‌شد و گوشی هر build رو
      #  به‌جای «آپدیت»، یه اپ کاملاً جدید و ناشناس حساب می‌کرد که نصبش کندتره)
      - name: Cache debug keystore
        uses: actions/cache@v4
        with:
          path: ~/.android/debug.keystore
          key: android-debug-keystore-v1

      - name: Ensure debug keystore exists
        run: |
          mkdir -p ~/.android
          if [ ! -f ~/.android/debug.keystore ]; then
            keytool -genkey -v -keystore ~/.android/debug.keystore \
              -storepass android -alias androiddebugkey -keypass android \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
          fi

      # به‌جای ./gradlew (که فایلش تو زیپ نبود)، خود Gradle رو مستقیم نصب می‌کنیم
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      # ───── Debug APK ─────
      - name: Build Debug APK
        working-directory: project
        run: gradle assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: project/app/build/outputs/apk/debug/app-debug.apk

      # ───── Release APK امضاشده (فقط اگه ۴ تا secret زیر رو تو ریپو ست کرده باشی) ─────
      # نکته: تو if نمی‌شه مستقیم از context «secrets» استفاده کرد (گیت‌هاب اجازه نمی‌ده
      # و ارور "Unrecognized named-value: 'secrets'" می‌ده)، برای همین اول مقدارش رو
      # تو یه env در سطح job (HAS_RELEASE_SIGNING) می‌ریزیم و بعد تو if از همون env
      # استفاده می‌کنیم.
      - name: Decode Keystore
        if: ${{ env.HAS_RELEASE_SIGNING == 'true' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > project/app/release.keystore

      - name: Build Signed Release APK
        if: ${{ env.HAS_RELEASE_SIGNING == 'true' }}
        working-directory: project
        run: |
          gradle assembleRelease \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/project/app/release.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: Upload Release APK
        if: ${{ env.HAS_RELEASE_SIGNING == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: project/app/build/outputs/apk/release/app-release.apk
